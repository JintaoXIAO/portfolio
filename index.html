<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投资组合追踪器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- 顶部标题 -->
    <div class="header">
      <div>
        <h1>投资组合追踪器</h1>
        <div class="subtitle">A 股持仓监控 &middot; 自动计算偏离度与调仓建议</div>
      </div>
    </div>

    <!-- 加载状态 -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>正在获取最新数据...</div>
    </div>

    <!-- 主内容 -->
    <div id="main-content" style="display: none;">

      <!-- 概览卡片 -->
      <div class="summary-cards">
        <div class="card">
          <div class="label">总市值</div>
          <div class="value" id="total-value">-</div>
        </div>
        <div class="card">
          <div class="label">持仓品种</div>
          <div class="value" id="stock-count">-</div>
        </div>
        <div class="card">
          <div class="label">最大偏离</div>
          <div class="value" id="max-deviation">-</div>
        </div>
        <div class="card">
          <div class="label">更新时间</div>
          <div class="value" id="update-time" style="font-size: 1rem;">-</div>
        </div>
      </div>

      <!-- 持仓明细表 -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>标的</th>
              <th>持仓</th>
              <th>最新价</th>
              <th>市值</th>
              <th>目标占比</th>
              <th>实际占比</th>
              <th>偏离</th>
              <th>操作建议</th>
            </tr>
          </thead>
          <tbody id="holdings-body"></tbody>
        </table>
      </div>

      <!-- 底部警告 -->
      <div id="alerts" class="alerts"></div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
