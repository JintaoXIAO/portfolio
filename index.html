<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投资组合追踪器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- 顶部标题 -->
    <div class="header">
      <div>
        <h1>投资组合追踪器</h1>
        <div class="subtitle">持仓监控 &middot; 偏离度分析 &middot; 调仓建议 &middot; AI 分析</div>
      </div>
      <div id="market-status" class="market-status"></div>
    </div>

    <!-- 加载状态 -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <div>正在获取最新数据...</div>
    </div>

    <!-- 主内容 -->
    <div id="main-content" style="display: none;">

      <!-- 概览卡片 -->
      <div class="summary-cards">
        <div class="card">
          <div class="label">总市值</div>
          <div class="value" id="total-value">-</div>
        </div>
        <div class="card">
          <div class="label">今日盈亏</div>
          <div class="value" id="today-pnl">-</div>
        </div>
        <div class="card">
          <div class="label">持仓盈亏</div>
          <div class="value" id="total-pnl" style="font-size: 1.1rem;">-</div>
        </div>
        <div class="card">
          <div class="label">持仓品种</div>
          <div class="value" id="stock-count">-</div>
        </div>
        <div class="card">
          <div class="label">最大偏离</div>
          <div class="value" id="max-deviation">-</div>
        </div>
        <div class="card">
          <div class="label">更新时间</div>
          <div class="value" id="update-time" style="font-size: 1rem;">-</div>
        </div>
      </div>

      <!-- 资产配置图 -->
      <div class="section-title">资产配置</div>
      <div class="charts-section">
        <div class="chart-card">
          <h3>目标配置</h3>
          <div class="chart-body">
            <div id="target-pie" class="pie-container"></div>
            <div id="target-legend" class="legend-container"></div>
          </div>
        </div>
        <div class="chart-card">
          <h3>实际配置</h3>
          <div class="chart-body">
            <div id="actual-pie" class="pie-container"></div>
            <div id="actual-legend" class="legend-container"></div>
          </div>
        </div>
      </div>

      <!-- 资产分类汇总 -->
      <div class="section-title">分类汇总</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="text-align:left">类别</th>
              <th>市值</th>
              <th>目标占比</th>
              <th>实际占比</th>
              <th>偏离</th>
            </tr>
          </thead>
          <tbody id="category-body"></tbody>
        </table>
      </div>

      <!-- 持仓明细表 -->
      <div class="section-title">持仓明细</div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th data-sort="name">标的</th>
              <th data-sort="shares">持仓</th>
              <th data-sort="price">最新价</th>
              <th data-sort="marketValue">市值</th>
              <th data-sort="pnl">盈亏</th>
              <th data-sort="targetPct">目标占比</th>
              <th data-sort="actualPct">实际占比</th>
              <th data-sort="deviation">偏离</th>
              <th>操作建议</th>
            </tr>
          </thead>
          <tbody id="holdings-body"></tbody>
          <tfoot id="holdings-foot"></tfoot>
        </table>
      </div>

      <!-- 增量调仓计算器 -->
      <div class="section-title">增量调仓计算器</div>
      <div class="rebalancer-card">
        <div class="rebalancer-desc">输入新增资金，自动计算最优买入分配方案（按偏离度分配，ETF 整手 100 股）</div>
        <div class="rebalancer-input">
          <input type="number" id="new-cash-input" placeholder="输入新增资金 (元)" min="0" step="100" />
          <button id="calc-rebalance-btn">计算分配</button>
        </div>
        <div id="rebalance-result"></div>
      </div>

      <!-- AI 持仓分析 -->
      <div class="section-title">AI 持仓分析</div>
      <div class="ai-card">
        <div class="ai-desc">基于 Cloudflare Workers AI，对当前持仓进行智能分析，提供配置评价、风险提示和调仓建议。</div>
        <div class="ai-actions">
          <button id="ai-analyze-btn" class="ai-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93"/>
              <path d="M8.24 9.93A4 4 0 0 1 12 2"/>
              <path d="M12 18v4"/>
              <path d="M8 22h8"/>
              <circle cx="12" cy="14" r="4"/>
            </svg>
            开始分析
          </button>
          <button id="ai-stop-btn" class="ai-btn ai-btn-stop" style="display: none;">停止</button>
        </div>
        <div id="ai-result" class="ai-result" style="display: none;">
          <div id="ai-content" class="ai-content"></div>
        </div>
      </div>

      <!-- 底部警告 -->
      <div id="alerts" class="alerts"></div>

    </div>
  </div>

  <!-- 浮动刷新按钮 -->
  <button id="refresh-btn" class="fab-refresh" title="点击刷新">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/>
      <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/>
      <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
